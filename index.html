<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sound Travels — Affective Soundscape Rating</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />

<!-- jsPsych v7 (the version cognition.run currently runs).
     Pin explicit /dist/ paths — bare package URLs sometimes resolve to the Node CJS
     build, which silently fails to define globals like `initJsPsych`. -->
<script src="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/dist/index.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-keyboard-response@1.1.3/dist/index.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-html-button-response@1.1.3/dist/index.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-preload@1.1.2/dist/index.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@jspsych/plugin-survey-html-form@1.0.3/dist/index.browser.min.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspsych@7.3.4/css/jspsych.css" />
</head>
<body>
<script>
  /* =====================================================================
     ONE-TIME CONFIG — change this and only this when moving from local to
     GitHub Pages + cognition.run.
     --------------------------------------------------------------------- */
  // ""                                  -> local dev (relative paths)
  // "https://USER.github.io/REPO/"      -> production
window.SOUND_TRAVELS_BASE = "https://shanahdt.github.io/sound-travels-circumplex/";

  /* =====================================================================
     Bootstrap — loads our app modules (CSS + 5 JS files) from BASE.
     The dynamic loader lets us keep one source of truth (SOUND_TRAVELS_BASE)
     instead of duplicating URLs across script src attributes.
     --------------------------------------------------------------------- */
  (function () {
    const base = window.SOUND_TRAVELS_BASE;
    const prefix = base || "";

    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = prefix + "css/styles.css";
    document.head.appendChild(link);

    const modules = [
      "js/config.js",
      "js/circumplex-plugin.js",
      "js/trial-builder.js",
      "js/stages.js",
      "js/main.js",
    ];
    for (const path of modules) {
      const s = document.createElement("script");
      s.src = prefix + path;
      s.async = false;             // preserve load order
      document.head.appendChild(s);
    }
  })();
</script>
</body>
</html>
